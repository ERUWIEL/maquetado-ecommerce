<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Nexus Games | Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#9f1fef",
                        "background-light": "#f7f6f8",
                        "background-dark": "#1b1022",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glow-overlay {
            background: radial-gradient(circle at 50% 50%, rgba(159, 31, 239, 0.15) 0%, rgba(27, 16, 34, 0) 70%);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display overflow-x-hidden">
    <div class="fixed inset-0 glow-overlay pointer-events-none"></div>
    <div class="relative flex h-screen w-full flex-col items-center justify-center p-4">
        <header class="absolute top-0 left-0 w-full flex items-center justify-between px-6 py-6 lg:px-12">
            <div class="flex items-center gap-3">
                <div class="size-8 bg-primary rounded flex items-center justify-center text-white">
                    <span class="material-symbols-outlined text-2xl">grid_view</span>
                </div>
                <h2 class="text-slate-900 dark:text-white text-xl font-bold tracking-tight">Nexus Games</h2>
            </div>
            <div class="hidden md:flex gap-6">
                <a class="text-sm font-medium hover:text-primary transition-colors" href="#">Support</a>
                <a class="text-sm font-medium hover:text-primary transition-colors" href="#">Community</a>
            </div>
        </header>
        <div class="w-full max-w-md z-10">
            <div
                class="bg-white/5 dark:bg-primary/5 backdrop-blur-xl border border-slate-200/10 dark:border-primary/20 rounded-xl p-8 shadow-2xl">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold mb-2 tracking-tight">Access the Nexus</h1>
                    <p class="text-slate-500 dark:text-slate-400">Welcome back, Commander.</p>
                </div>
                <form class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium mb-2 text-slate-700 dark:text-slate-300">Email
                            Address</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">alternate_email</span>
                            <input
                                class="w-full pl-11 pr-4 py-3 bg-slate-100 dark:bg-background-dark/50 border border-slate-200 dark:border-primary/20 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all"
                                placeholder="name@nexus.com" type="email" />
                        </div>
                    </div>
                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="text-sm font-medium text-slate-700 dark:text-slate-300">Password</label>
                            <a class="text-xs text-primary hover:underline" href="#">Forgot Password?</a>
                        </div>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
                            <input
                                class="w-full pl-11 pr-4 py-3 bg-slate-100 dark:bg-background-dark/50 border border-slate-200 dark:border-primary/20 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all"
                                placeholder="••••••••" type="password" />
                        </div>
                    </div>
                    <button
                        class="w-full py-3 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg transition-all shadow-lg shadow-primary/20 transform hover:-translate-y-0.5 active:translate-y-0"
                        type="submit">
                        LOGIN TO NEXUS
                    </button>
                </form>
                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-slate-200 dark:border-primary/20"></div>
                    </div>
                    <div class="relative flex justify-center text-xs uppercase">
                        <span class="bg-background-light dark:bg-[#25182d] px-2 text-slate-500">Or continue with</span>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button
                        class="flex items-center justify-center gap-2 py-2.5 px-4 bg-white dark:bg-white/5 border border-slate-200 dark:border-primary/20 rounded-lg hover:bg-slate-50 dark:hover:bg-white/10 transition-colors">
                        <svg class="w-5 h-5" viewbox="0 0 24 24">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4"></path>
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853"></path>
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.26.81-.58z"
                                fill="#FBBC05"></path>
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z"
                                fill="#EA4335"></path>
                        </svg>
                        <span class="text-sm font-medium">Google</span>
                    </button>
                    <button
                        class="flex items-center justify-center gap-2 py-2.5 px-4 bg-white dark:bg-white/5 border border-slate-200 dark:border-primary/20 rounded-lg hover:bg-slate-50 dark:hover:bg-white/10 transition-colors">
                        <svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
                            <path
                                d="M11.979 0C5.396 0 .041 5.356.041 11.94c0 1.25.19 2.454.542 3.588 3.535 1.373 7.82 2.39 12.187 2.39h.034c4.364 0 8.653-1.017 12.188-2.39.352-1.134.543-2.338.543-3.588C25.534 5.356 20.18 0 13.597 0zm-2.09 11.442h.001c-1.383 0-2.502-1.12-2.502-2.501 0-1.382 1.119-2.502 2.502-2.502 1.38 0 2.501 1.12 2.501 2.502 0 1.381-1.12 2.501-2.501 2.501zm4.223 0h.001c-1.383 0-2.503-1.12-2.503-2.501 0-1.382 1.12-2.502 2.503-2.502 1.38 0 2.5 1.12 2.5 2.502 0 1.381-1.12 2.501-2.5 2.501z">
                            </path>
                            <path
                                d="M1.385 16.536C.68 17.65 1.838 18.15 3.344 18.42c1.942.348 4.298.583 6.786.685.122 0 .23.014.34.027v3.085c0 .736.545 1.321 1.22 1.321h.51c.675 0 1.22-.585 1.22-1.321v-3.085c.111-.013.218-.027.34-.027 2.488-.102 4.844-.337 6.786-.685 1.506-.27 2.664-.77 1.959-1.884-.712-1.126-2.603-1.464-4.832-1.812-3.14-.492-7.07-.492-10.211 0-2.23.348-4.12.686-4.832 1.812z">
                            </path>
                        </svg>
                        <span class="text-sm font-medium">Steam</span>
                    </button>
                </div>
            </div>
            <div class="mt-8 text-center">
                <p class="text-sm text-slate-500 dark:text-slate-400">
                    Don't have an account?
                    <a class="text-primary font-bold hover:underline" href="#">Join the Nexus</a>
                </p>
            </div>
        </div>
        <footer class="absolute bottom-6 w-full text-center px-4">
            <p class="text-xs text-slate-500 dark:text-slate-500 tracking-widest uppercase">
                © 2024 Nexus Interactive. All rights reserved.
            </p>
        </footer>
        <div class="absolute inset-0 -z-10 overflow-hidden">
            <div class="absolute top-[10%] right-[10%] w-72 h-72 bg-primary/20 blur-[120px] rounded-full"></div>
            <div class="absolute bottom-[10%] left-[10%] w-72 h-72 bg-primary/20 blur-[120px] rounded-full"></div>
        </div>
    </div>
</body>

</html>
