<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Games | Login</title>
    <link rel="stylesheet" href="../css/globals.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/auth.css" />
</head>

<body>
    <div class="auth-bg-overlay"></div>
    <div class="auth-layout">
        <header class="auth-header">
            <a href="../index.html" class="topbar-brand">
                <div class="topbar-logo">
                    <span class="material-symbols-outlined">rocket_launch</span>
                </div>
                <span class="topbar-name">NEXUS GAMES</span>
            </a>
            <div class="auth-header-nav">
                <a href="#">Support</a>
                <a href="#">Community</a>
            </div>
        </header>
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-title-wrapper">
                    <h1 class="auth-title">Access the Nexus</h1>
                    <p class="auth-subtitle">Welcome back, Commander.</p>
                </div>
                <form class="auth-form">
                    <div class="input-group">
                        <label>Email Address</label>
                        <div class="auth-input-wrapper">
                            <span class="material-symbols-outlined">alternate_email</span>
                            <input class="input" placeholder="name@nexus.com" type="email" />
                        </div>
                    </div>
                    <div class="input-group">
                        <div style="display: flex; justify-content: space-between;">
                            <label>Password</label>
                            <a class="auth-forgot-link" href="#">Forgot Password?</a>
                        </div>
                        <div class="auth-input-wrapper">
                            <span class="material-symbols-outlined">lock</span>
                            <input class="input" placeholder="••••••••" type="password" />
                        </div>
                    </div>
                    <button class="btn btn-primary" style="width: 100%; justify-content: center; height: 48px;"
                        type="submit">
                        LOGIN TO NEXUS
                    </button>
                </form>
                <div class="auth-divider">
                    <span>Or continue with</span>
                </div>
                <div class="auth-social-grid">
                    <button class="auth-btn-social" type="button">
                        <svg viewbox="0 0 24 24">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4"></path>
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853"></path>
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.26.81-.58z"
                                fill="#FBBC05"></path>
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z"
                                fill="#EA4335"></path>
                        </svg>
                        Google
                    </button>
                    <button class="auth-btn-social" type="button">
                        <svg fill="currentColor" viewbox="0 0 24 24">
                            <path
                                d="M11.979 0C5.396 0 .041 5.356.041 11.94c0 1.25.19 2.454.542 3.588 3.535 1.373 7.82 2.39 12.187 2.39h.034c4.364 0 8.653-1.017 12.188-2.39.352-1.134.543-2.338.543-3.588C25.534 5.356 20.18 0 13.597 0zm-2.09 11.442h.001c-1.383 0-2.502-1.12-2.502-2.501 0-1.382 1.119-2.502 2.502-2.502 1.38 0 2.501 1.12 2.501 2.502 0 1.381-1.12 2.501-2.501 2.501zm4.223 0h.001c-1.383 0-2.503-1.12-2.503-2.501 0-1.382 1.12-2.502 2.503-2.502 1.38 0 2.5 1.12 2.5 2.502 0 1.381-1.12 2.501-2.5 2.501z">
                            </path>
                            <path
                                d="M1.385 16.536C.68 17.65 1.838 18.15 3.344 18.42c1.942.348 4.298.583 6.786.685.122 0 .23.014.34.027v3.085c0 .736.545 1.321 1.22 1.321h.51c.675 0 1.22-.585 1.22-1.321v-3.085c.111-.013.218-.027.34-.027 2.488-.102 4.844-.337 6.786-.685 1.506-.27 2.664-.77 1.959-1.884-.712-1.126-2.603-1.464-4.832-1.812-3.14-.492-7.07-.492-10.211 0-2.23.348-4.12.686-4.832 1.812z">
                            </path>
                        </svg>
                        Steam
                    </button>
                </div>
            </div>
            <div class="auth-footer-text">
                <p>
                    Don't have an account?
                    <a href="#">Join the Nexus</a>
                </p>
            </div>
        </div>
        <footer class="auth-bottom-footer">
            <p>© 2024 Nexus Interactive. All rights reserved.</p>
        </footer>
    </div>
</body>

</html>
