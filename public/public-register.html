<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Nexus Games - Join the Universe</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#9f1fef",
                        "background-light": "#f7f6f8",
                        "background-dark": "#1b1022",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
        <div class="layout-container flex h-full grow flex-col">
            <!-- Navigation -->
            <header
                class="flex items-center justify-between whitespace-nowrap border-b border-solid border-primary/20 px-6 md:px-20 py-4 bg-background-light dark:bg-background-dark/50 backdrop-blur-md sticky top-0 z-50">
                <div class="flex items-center gap-4">
                    <div class="w-8 h-8 text-primary">
                        <svg fill="currentColor" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M24 45.8096C19.6865 45.8096 15.4698 44.5305 11.8832 42.134C8.29667 39.7376 5.50128 36.3314 3.85056 32.3462C2.19985 28.361 1.76794 23.9758 2.60947 19.7452C3.451 15.5145 5.52816 11.6284 8.57829 8.5783C11.6284 5.52817 15.5145 3.45101 19.7452 2.60948C23.9758 1.76795 28.361 2.19986 32.3462 3.85057C36.3314 5.50129 39.7376 8.29668 42.134 11.8833C44.5305 15.4698 45.8096 19.6865 45.8096 24L24 24L24 45.8096Z">
                            </path>
                        </svg>
                    </div>
                    <h2 class="text-xl font-bold leading-tight tracking-tight">Nexus Games</h2>
                </div>
                <div class="flex gap-4 items-center">
                    <span class="hidden md:inline text-sm text-slate-500 dark:text-slate-400">Already have an
                        account?</span>
                    <button
                        class="flex min-w-[84px] cursor-pointer items-center justify-center rounded-lg h-10 px-6 bg-primary/10 border border-primary/30 text-primary text-sm font-bold hover:bg-primary/20 transition-all">
                        Login
                    </button>
                </div>
            </header>
            <main
                class="flex-1 flex items-center justify-center px-4 py-12 md:py-20 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-primary/10 via-transparent to-transparent">
                <div
                    class="w-full max-w-[520px] bg-white dark:bg-primary/5 border border-slate-200 dark:border-primary/20 rounded-xl p-8 md:p-12 shadow-2xl">
                    <!-- Title Section -->
                    <div class="mb-8">
                        <h1
                            class="text-3xl md:text-4xl font-black leading-tight tracking-tight text-slate-900 dark:text-white mb-2">
                            Create Account</h1>
                        <p class="text-slate-600 dark:text-primary/60 text-base">Embark on your journey across the Nexus
                            multiverse.</p>
                    </div>
                    <!-- Registration Form -->
                    <form class="space-y-5">
                        <!-- Username -->
                        <div class="space-y-2">
                            <label
                                class="text-sm font-semibold text-slate-700 dark:text-slate-200 block">Username</label>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
                                <input
                                    class="w-full bg-slate-50 dark:bg-background-dark border border-slate-200 dark:border-primary/30 rounded-lg h-12 pl-12 pr-4 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-slate-400"
                                    placeholder="Unique explorer name" required="" type="text" />
                            </div>
                        </div>
                        <!-- Email -->
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-200 block">Email
                                Address</label>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
                                <input
                                    class="w-full bg-slate-50 dark:bg-background-dark border border-slate-200 dark:border-primary/30 rounded-lg h-12 pl-12 pr-4 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-slate-400"
                                    placeholder="email@nexus.com" required="" type="email" />
                            </div>
                        </div>
                        <!-- Password Grid -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label
                                    class="text-sm font-semibold text-slate-700 dark:text-slate-200 block">Password</label>
                                <div class="relative">
                                    <span
                                        class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
                                    <input
                                        class="w-full bg-slate-50 dark:bg-background-dark border border-slate-200 dark:border-primary/30 rounded-lg h-12 pl-12 pr-4 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-slate-400"
                                        placeholder="••••••••" required="" type="password" />
                                </div>
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-semibold text-slate-700 dark:text-slate-200 block">Confirm
                                    Password</label>
                                <div class="relative">
                                    <span
                                        class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">verified_user</span>
                                    <input
                                        class="w-full bg-slate-50 dark:bg-background-dark border border-slate-200 dark:border-primary/30 rounded-lg h-12 pl-12 pr-4 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-slate-400"
                                        placeholder="••••••••" required="" type="password" />
                                </div>
                            </div>
                        </div>
                        <!-- Terms & Conditions -->
                        <div class="flex items-start gap-3 py-2">
                            <div class="flex items-center h-5">
                                <input
                                    class="w-4 h-4 rounded border-slate-300 dark:border-primary/40 text-primary focus:ring-primary bg-transparent"
                                    id="terms" required="" type="checkbox" />
                            </div>
                            <label class="text-xs md:text-sm text-slate-600 dark:text-slate-400 leading-normal"
                                for="terms">
                                I agree to the <a class="text-primary hover:underline" href="#">Terms of Service</a> and
                                <a class="text-primary hover:underline" href="#">Privacy Policy</a>, and I am at least
                                13 years old.
                            </label>
                        </div>
                        <!-- Submit Button -->
                        <button
                            class="w-full h-14 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group"
                            type="submit">
                            <span>Create Account</span>
                            <span
                                class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
                        </button>
                        <div class="relative flex py-4 items-center">
                            <div class="flex-grow border-t border-slate-200 dark:border-primary/20"></div>
                            <span class="flex-shrink mx-4 text-slate-400 text-xs uppercase tracking-widest font-bold">Or
                                register with</span>
                            <div class="flex-grow border-t border-slate-200 dark:border-primary/20"></div>
                        </div>
                        <!-- Social Login -->
                        <div class="grid grid-cols-2 gap-4">
                            <button
                                class="flex items-center justify-center gap-2 h-12 rounded-lg border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 hover:bg-slate-50 dark:hover:bg-primary/10 transition-all"
                                type="button">
                                <svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
                                    <path
                                        d="M12.48 10.92v3.28h7.84c-.24 1.84-.908 3.152-1.928 4.176-1.228 1.224-3.136 2.58-6.6 2.58-5.392 0-9.712-4.384-9.712-9.72s4.32-9.72 9.712-9.72c2.928 0 5.12 1.152 6.696 2.64l2.304-2.304C18.528 1.848 15.936 0 12.48 0 6.132 0 1.044 5.088 1.044 11.424s5.088 11.424 11.436 11.424c3.696 0 6.48-1.212 8.688-3.512 2.268-2.268 2.976-5.4 2.976-7.896 0-.588-.048-1.14-.144-1.536h-11.52z">
                                    </path>
                                </svg>
                                <span class="text-sm font-semibold">Google</span>
                            </button>
                            <button
                                class="flex items-center justify-center gap-2 h-12 rounded-lg border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 hover:bg-slate-50 dark:hover:bg-primary/10 transition-all"
                                type="button">
                                <svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
                                    <path
                                        d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z">
                                    </path>
                                </svg>
                                <span class="text-sm font-semibold">Meta</span>
                            </button>
                        </div>
                    </form>
                </div>
            </main>
            <!-- Footer Small -->
            <footer class="px-6 md:px-20 py-8 border-t border-primary/10 text-center">
                <p class="text-slate-500 text-sm">© 2024 Nexus Games Multiverse. All rights reserved.</p>
            </footer>
        </div>
    </div>
</body>

</html>
